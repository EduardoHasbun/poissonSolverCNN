general:
    name_case: 'interface3d_2'
    data_dir: 'dataset/generated/random.npy' 


arch:
    model: "UNet"
    arch_dir: 'Unet_ks3_rf200.yml'
    type: 'UNet4'


globals:                                    # Domain sizes and others, used to compute global attributes
    nnx: 50                                # Number of points in x direction
    nny: 50                                # Number of points in y direction
    nnz: 50
    xmin: -2.5
    xmax: 2.5
    ymin: -2.5
    ymax: 2.5
    zmin: -2.5
    zmax: 2.5
    interface_center:
        x: 0
        y: 0
        z: 0
    interface_radius: 1.
    epsilon_inside: 1.0
    epsilon_outside: 80.0
    


data_loader:
    batch_size: 64


loss:
    type: laplacian
    args:
        bound_weight: 5.0e+0
        interface_weight: 5.0e+5               # Weighting of the loss on the boundaries (float)
        lapl_weight: 2.0e+4                # Weighting of the loss on the Laplacian (float)
        optimizer_lr: 2.e-4 
        inside_weight: 1.0e+7

trainer:
    epochs: 50                              # Number of epochs
